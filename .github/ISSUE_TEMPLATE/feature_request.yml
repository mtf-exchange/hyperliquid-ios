name: Feature request
description: Propose a new capability, screen, or polish.
title: "[feat] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve
      description: Describe the user pain first, before jumping to a solution.
      placeholder: |
        I want to set a TP and SL together when I open a position, right
        now I have to place the entry, wait for fill, then file two more
        orders.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Screens, controls, and flow. Rough sketches / screenshots welcome.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this touch? (picks a label for you)
      multiple: true
      options:
        - ui
        - home
        - markets
        - trade
        - user
        - chart
        - orderbook
        - signing
        - websocket
        - api
        - wallet-connect
        - hip-3
        - performance

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any existing workflow or workaround the user has today?
