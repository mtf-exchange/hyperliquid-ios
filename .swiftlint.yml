## SwiftLint config for hyperliquid-ios
## Run: `brew install swiftlint && swiftlint` at the repo root.
## Editing a rule? Justify it here and in the PR description.

included:
  - HyperliquidApp
  - HyperliquidAppTests

excluded:
  - HyperliquidApp.xcodeproj         # regenerated by xcodegen
  - .build
  - .swiftpm
  - DerivedData
  - build
  - Carthage
  - Pods

# Disabled rules — keep this list small and reasoned.
disabled_rules:
  - todo                             # deliberate — we leave `TODO(owner):` markers
  - trailing_comma                   # disagree with default; prefer trailing commas
  - multiple_closures_with_trailing_closure
  - large_tuple                      # used in WS decoders (dex, state) pairs
  - file_length                      # some view files earn their length

analyzer_rules:
  - unused_declaration
  - unused_import

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - nslocalizedstring_key
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Length overrides — SwiftUI view bodies legitimately run long.
line_length:
  warning: 160
  error: 220
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

function_body_length:
  warning: 80
  error: 160

type_body_length:
  warning: 400
  error: 800

nesting:
  type_level: 2
  function_level: 4

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 80
  allowed_symbols: ["_"]
  excluded:
    - id
    - r   # ECDSA signature components
    - s
    - v
    - t   # msgpack + candle field names from the Hyperliquid wire format
    - T
    - i
    - o
    - c
    - h
    - l
    - n
    - k
    - d

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 80

force_cast: warning
force_try: warning
force_unwrapping: warning

cyclomatic_complexity:
  warning: 12
  error: 20

# Custom rules would go here. Left empty intentionally — the project still
# prints to Xcode's console for WebSocket debugging, and a `no_print` rule
# would dilute lint output. Feel free to add your own in a PR.
custom_rules: {}
