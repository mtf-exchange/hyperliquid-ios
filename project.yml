name: HyperliquidApp
options:
  bundleIdPrefix: exchange.mtf
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  ReownSwift:
    url: https://github.com/reown-com/reown-swift
    from: "1.6.0"
  secp256k1:
    url: https://github.com/GigaBitcoin/secp256k1.swift
    from: "0.23.0"
  CryptoSwift:
    url: https://github.com/krzyzanowskim/CryptoSwift
    from: "1.8.0"
  SVGView:
    url: https://github.com/exyte/SVGView
    from: "1.0.6"

targets:
  HyperliquidApp:
    type: application
    platform: iOS
    sources:
      - path: HyperliquidApp
    dependencies:
      - package: ReownSwift
        product: ReownAppKit
      - package: ReownSwift
        product: WalletConnect
      - package: secp256k1
        product: P256K
      - package: secp256k1
        product: libsecp256k1
      - package: CryptoSwift
      - package: SVGView
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: exchange.mtf.hl
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: Hyperliquid
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: HyperliquidApp/HyperliquidApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.exchange.mtf.hl
    info:
      path: HyperliquidApp/Resources/Info.plist
      properties:
        # Replace with your own id from https://cloud.reown.com — leaving
        # this empty makes WalletConnect fail to configure at launch.
        REOWN_PROJECT_ID: ""
        CFBundleURLTypes:
          - CFBundleURLName: exchange.mtf.hl
            CFBundleURLSchemes: [hyperliquid]
        LSApplicationQueriesSchemes:
          - metamask
          - rainbow
          - trust
          - zerion
          - rainbow-walletconnect
          - safe
          - ledgerlive
          - walletapp
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false

  HyperliquidAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HyperliquidAppTests
    dependencies:
      - target: HyperliquidApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: exchange.mtf.hl.tests
        GENERATE_INFOPLIST_FILE: YES
